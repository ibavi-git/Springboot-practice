<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

            function display(){
                let num1 = document.getElementById("num1").value;
                let num2 = document.getElementById("num2").value;

                let a = add(num1,num2);

                document.getElementById("result").textContent = "Result: " + a;

            }
            function add(num1,num2){
                
                let sum =  Number(num1) + Number(num2);
                return sum;
                
            }
            function sub(){
                let num1 = document.getElementById("num1").value;
                let num2 = document.getElementById("num2").value;
                let diff = Number(num1) - Number(num2);
                document.getElementById("result").textContent = "Result: " + diff;
            }
            function mul(){
                let num1 =  document.getElementById("num1").value;
                let num2 =  document.getElementById("num2").value;
                let product = Number(num1) * Number(num2);
                document.getElementById("result").textContent = "Result: " + product;
            }
            function div(){
                let num1 = document.getElementById("num1").value;
                let num2 = document.getElementById("num2").value;
                let quotient = Number(num1) / Number(num2);
                document.getElementById("result").textContent = "Result: " + quotient;
            }
        </script>
</head>
<body>
    <h1 style="text-align: center;">Calculator</h1>
    <input type="number" id="num1" placeholder="Enter first number"><br><br>
    <input type="number" id="num2" placeholder="Enter second number">
    <br><br>
    <button onclick="display()">Add</button> 
    <button onclick="sub()">Subtract</button>
    <button onclick="mul()">Multiply</button>
    <button onclick="div()">Divide</button> 
    <h1 id="result"></h1>
</body>
</html>
