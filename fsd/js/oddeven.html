<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oddeven</title>
</head>
<script>
    function check(){
        let n1 = document.getElementById("num1").value;
        let n2 = document.getElementById("num2").value;
        let n = Number(n1)+Number(n2);
        let sum = 0;

        while(n !=0){
            let a = n%10;
            sum += a;
            n= Math.floor(n/10);
        }
        if(sum % 2 === 0){
            console.log("even");
            document.getElementById("res").textContent="even";
        }
        else{
            console.log("odd");
            document.getElementById("res").textContent="odd";
        }

    }

</script>
<body>
    <input type="number" id ="num1" placeholder="Enter a number1">
    <input type="number" id ="num2" placeholder="Enter a number2">
    <button onclick="check()">Check</button>
    <p id="res"></p>
</body>
</html>
