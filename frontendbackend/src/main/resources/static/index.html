<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script>
        async function add(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            const response = await fetch(`http://localhost:8081/calc/add/${num1}/${num2}`);
            const text = await response.text();

            document.getElementById("result").innerText=text;
        }
        async function sqrt(){
            let num1 = document.getElementById("num1").value;

            const response = await fetch(`http://localhost:8081/calc/sqrt/${num1}`);
            const text = await response.text();

            document.getElementById("result").innerText=text;
        }
        async function pow(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            const response = await fetch(`http://localhost:8081/calc/pow/${num1}/${num2}`);
            const text = await response.text();

            document.getElementById("result").innerText=text;
        }
        async function sin(){
            let num1 = document.getElementById("num1").value;

            const response = await fetch(`http://localhost:8081/calc/sin/${num1}`);
            const text = await response.text();

            document.getElementById("result").innerText=text;
        }
        async function cos(){
            let num1 = document.getElementById("num1").value;

            const response = await fetch(`http://localhost:8081/calc/cos/${num1}`);
            const text = await response.text();

            document.getElementById("result").innerText=text;
        }
        async function tan(){
            let num1 = document.getElementById("num1").value;

            const response = await fetch(`http://localhost:8081/calc/tan/${num1}`);
            const text = await response.text();

            document.getElementById("result").innerText=text;
        }
        async function spi(){

            const response = await fetch(`http://localhost:8081/spiral`);
            const text = await response.text();

            document.getElementById("result").innerText=text;
        }
    </script>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f0f0f0; text-align: center; padding-top: 50px;">

<h1>Scientific Calculator</h1>


<input
        type="text"
        id="num1"
        placeholder="Enter Number 1"
        style="padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc;">

<input
        type="text"
        id="num2"
        placeholder="Enter Number 2"
        style="padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc;">

<br><br>

<button onclick="add()"
        style="padding: 10px 20px; margin: 5px; border-radius: 8px; cursor: pointer;">
    Add
</button>

<button onclick="sqrt()"
        style="padding: 10px 20px; margin: 5px; border-radius: 8px; cursor: pointer;">
    Sqrt
</button>

<button onclick="sin()"
        style="padding: 10px 20px; margin: 5px; border-radius: 8px; cursor: pointer;">
    Sin
</button>

<button onclick="cos()"
        style="padding: 10px 20px; margin: 5px; border-radius: 8px; cursor: pointer;">
    Cos
</button>

<button onclick="tan()"
        style="padding: 10px 20px; margin: 5px; border-radius: 8px; cursor: pointer;">
    Tan
</button>

<button onclick="pow()"
        style="padding: 10px 20px; margin: 5px; border-radius: 8px; cursor: pointer;">
    Pow
</button>

<button onclick="spi()"
        style="padding: 10px 20px; margin: 5px; border-radius: 8px; cursor: pointer;">
    Spiral matrix
</button>

<h1 id="result" style="color: blue; margin-top: 25px;"></h1>

</body>
</html>
